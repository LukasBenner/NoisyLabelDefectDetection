# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "SGD_NCE_RCE"
run_name: "${now:%Y-%m-%d_%H-%M-%S}_sgd_nce_rce"

model:
  optimizer:
    _target_: torch.optim.SGD
    lr: 0.091053
    momentum: 0.082537
    weight_decay: 0.00127422
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${num_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    alpha: 7.41137
    beta: 0.5786451

data:
  batch_size: 128