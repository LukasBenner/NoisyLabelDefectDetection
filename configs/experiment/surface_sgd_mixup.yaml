# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Mixup"

model:
  optimizer:
    _target_: torch.optim.SGD
    lr: 0.07016
    momentum: 0.6844
    weight_decay: 3.19570e-06
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss
  mixup:
    enabled: True
    alpha: 0.586630
data:
  batch_size: 32