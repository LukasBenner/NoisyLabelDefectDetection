# @package _global_

defaults:
  - override /trainer: gpu

num_runs: 10
seed: 42

experiment_name: ???
run_name: ???

callbacks:
  model_checkpoint:
    monitor: "val/acc"
    mode: "max"
    save_top_k: 2
    save_last: true
    filename: "epoch_{epoch:03d}_val_acc_{val/acc:.4f}"
  early_stopping:
    monitor: "val/acc"
    patience: 30
    mode: "max"