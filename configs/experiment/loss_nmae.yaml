# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_NMAE"
run_name: "${now:%Y-%m-%d_%H-%M-%S}"

model:
  optimizer:
    _target_: torch.optim.SGD
    lr: 0.01
    momentum: 0.09
    weight_decay: 0.001
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NormalizedMeanAbsoluteError
    scale: 1.0

data:
  batch_size: 32