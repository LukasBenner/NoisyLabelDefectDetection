# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_NMAE"
run_name: "${now:%Y-%m-%d_%H-%M-%S}"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0073
    weight_decay: 1.46e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NormalizedMeanAbsoluteError
    scale: 0.054

data:
  batch_size: 32