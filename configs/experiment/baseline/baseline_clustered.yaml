# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

experiment_name: "baseline"
run_name_postfix: "mobile_s_clustered"

n_runs: 10

model:
  num_classes: 12
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.00032
    weight_decay: 0.0
  scheduler: Null
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  train_path: /srv/defectDetectionDataset/surfaceClassification/baseline_clustered/train
  val_path: /srv/defectDetectionDataset/surfaceClassification/baseline_clustered/val
  test_path: /srv/defectDetectionDataset/surfaceClassification/baseline_clustered/test
  classes: [Bent, Blackstained, Cracked, GapDemo, MissingEnd, NoDeficiencies, Rust, ScratchedSurface, Silicate, UnknownStains, Unkown, Waterstains]
  transforms: baseline
  weight_alpha: 1.0
  use_weighted_sampler: false

callbacks:
  early_stopping:
    patience: 30

trainer:
  max_epochs: 200