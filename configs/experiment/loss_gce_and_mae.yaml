# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_GCE_MAE"
run_name: "${now:%Y-%m-%d_%H-%M-%S}"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0083
    weight_decay: 0.00044
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.GCEandMAE
    alpha: 0.23
    beta: 0.0068
    q: 0.39

data:
  batch_size: 64