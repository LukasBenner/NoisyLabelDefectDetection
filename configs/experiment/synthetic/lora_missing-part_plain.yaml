# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: Synthetic
experiment_name: lora
run_name_postfix: missing-part_plain

n_runs: 10

model:
  num_classes: 10
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.001
    momentum: 0.9
    weight_decay: 1e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
     _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  transforms: no_crop
  image1k_norm: true
  train_path: /workspace/data/full_clean_temporal_new/train
  val_path: /workspace/data/full_clean_temporal_new/val
  test_path: /workspace/data/full_clean_temporal_new/test
  syn_path: /workspace/data/synthetic/lora/missing_part_plain
  synthetic_classes: [missing_part]

callbacks:
  early_stopping:
    patience: 30