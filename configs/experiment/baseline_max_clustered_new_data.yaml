# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

experiment_name: "Baseline_Max"
run_name_postfix: "cluster_new_data"

n_runs: 5

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.00032
    weight_decay: 1e-5
  scheduler: Null
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  image1k_norm: true
  transforms: baseline
  train_path: /srv/defectDetectionDataset/surface_clustered_new_data/train
  val_path: /srv/defectDetectionDataset/surface_clustered_new_data/val
  test_path: /srv/defectDetectionDataset/surface_clustered_new_data/test

callbacks:
  early_stopping:
    patience: 50