# @package _global_

defaults:
  - override /data: holdout
  - override /callbacks: cifar
  - _self_

experiment_name: "MoCoV2"
run_name_postfix: "resnet_50"

n_runs: 3

trainer:
  max_epochs: 300

model:
  _target_: src.models.mocov2_module.MocoClassifier
  num_classes: 10
  pretrained: false
  backbone_norm: bn
  backbone_gn_groups: 32
  lr_backbone: 0.1
  lr_head: 0.1
  momentum: 0.9
  weight_decay: 1e-4
  freeze_backbone: false
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    _partial_: true
    alpha: 10
    beta: 0.1

ssl_model:
  _target_: src.models.mocov2_module.MoCoV2
  pretrained: false
  backbone_norm: bn
  backbone_gn_groups: 32
  proj_dim: 128
  proj_hidden_dim: 2048
  proj_num_layers: 2
  queue_size: 4096
  momentum: 0.996
  momentum_final: 0.9999
  temperature: 0.2
  lr: 0.05
  sgd_momentum: 0.9
  weight_decay: 1e-4
  eta_min: 0
  max_epochs: 100


ssl_data:
  _target_: src.data.unlabeled_datamodule.UnlabeledDataModule
  root_path: ${paths.root_dir}/data/unlabeled_ssl_data
  img_size: 480
  batch_size: 128
  num_workers: 4
  image1k_norm: false

data:
  batch_size: 128
  image1k_norm: false