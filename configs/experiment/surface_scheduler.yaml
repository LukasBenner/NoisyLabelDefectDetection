# @package _global_

run_name: "${now:%Y-%m-%d_%H-%M-%S}_scheduler"

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0002404
  weight_decay: 0.0005284
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${num_epochs}
loss:
  _target_: src.models.components.loss.CELoss
data:
  batch_size: 32