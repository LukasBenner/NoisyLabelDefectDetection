# @package _global_

defaults:
  - default
  - override /data: no_test_surface_data
  - override /model: surface_baseline
  - _self_

experiment_name: SurfaceDefectDetection
run_name: "baseline_improved_${now:%Y-%m-%d_%H-%M-%S}"

tags:
  base_model: "efficientnetb0"
  model_type: "CNN"
  data_version: "surface-v1"
  optimization: "baseline-improved"

model:
  num_classes: 12
  optimizer: 
    weight_decay: 0.0001
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    mode: min
    factor: 0.1
    patience: 10

callbacks:
  early_stopping:
    monitor: "val/acc"
    patience: 30
    mode: "max"

test: False