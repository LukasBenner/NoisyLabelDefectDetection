# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: cifar
  - _self_

experiment_name: "Loss_NCE_RCE"
run_name_postfix: "mobilenetv3_large"

n_runs: 5

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: large
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0001
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    alpha: 1
    beta: 0.1

data:
  batch_size: 64
  image1k_norm: true