# @package _global_

defaults:
  - /model: seal
  - override /data: seal
  - override /callbacks: no_early_stopping
  - _self_

experiment_name: "SEAL"
run_name_postfix: "not_pretrained"

n_runs: 3

model:
  net:
    pretrained: false
  epochs_per_iteration: 50
  num_iterations: 6
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 1e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    _partial_: true
    T_max: 300

data:
  batch_size: 32
  image1k_norm: false