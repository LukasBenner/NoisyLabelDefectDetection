# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "SGD"

model:
  optimizer:
    _target_: torch.optim.SGD
    lr: 0.024
    momentum: 0.011
    weight_decay: 1.081e-06
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32