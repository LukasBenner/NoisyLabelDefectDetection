# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "SGD"
run_name: "${now:%Y-%m-%d_%H-%M-%S}_sgd"

model:
  optimizer:
    _target_: torch.optim.SGD
    lr: 0.06959
    momentum: 0.1616
    weight_decay: 3.1045e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32