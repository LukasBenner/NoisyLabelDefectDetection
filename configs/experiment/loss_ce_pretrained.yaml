# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: cifar
  - _self_

experiment_name: "Loss_CE"
run_name_postfix: "pretrained"

n_runs: 3

model:
  net:
    pretrained: true
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.1
    momentum: 0.9
    weight_decay: 1e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  image1k_norm: true