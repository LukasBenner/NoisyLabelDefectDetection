# @package _global_

defaults:
  - default
  - override /data: kfold_datamodule
  - override /model: surface_baseline
  - _self_

experiment_name: SurfaceDefectDetection
run_name: "baseline_${now:%Y-%m-%d_%H-%M-%S}"

tags:
  base_model: "efficientnetb0"
  model_type: "CNN"
  data_version: "surface-v1"
  optimization: "baseline"

model:
  num_classes: 12
  optimizer:
    lr: 0.0003125
    weight_decay: 2.7e-6
  scheduler: Null

data:
  n_splits: 5
  batch_size: 32

callbacks:
  early_stopping:
    monitor: "val/acc"
    patience: 30
    mode: "max"

test: False
