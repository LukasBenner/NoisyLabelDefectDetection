# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_NCE_RCE"

model:
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 3e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    alpha: 50
    beta: 0.1

data:
  batch_size: 64