# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_NCE_RCE"
run_name: "${now:%Y-%m-%d_%H-%M-%S}"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0023
    weight_decay: 5.42e-06
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    alpha: 0.018
    beta: 0.43

data:
  batch_size: 64