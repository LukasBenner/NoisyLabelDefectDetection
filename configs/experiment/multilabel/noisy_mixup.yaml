# @package _global_

defaults:
  - /model: mixup
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: noisy
run_name_postfix: mixup

n_runs: 5

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.001
    momentum: 0.9
    weight_decay: 1e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss
  mixup_alpha: 0.1

data:
  batch_size: 32
  image1k_norm: true
  transforms: medium
  train_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clean_split_new/train
  val_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clean_split_new/val
  test_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clean_split_new/test

callbacks:
  early_stopping:
    patience: 30