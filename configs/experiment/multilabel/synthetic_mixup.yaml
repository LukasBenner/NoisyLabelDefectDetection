# @package _global_

defaults:
  - /model: mixup
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: synthetic
run_name_postfix: mixup

n_runs: 1

model:
  num_classes: 9
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: large
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 1e-4
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss
  mixup_alpha: 0.05

data:
  batch_size: 32
  image1k_norm: true
  transforms: medium
  syn_path: /srv/defectDetectionDataset/sourceSets/synthetic
  synthetic_classes: [black_stain, corrosion, deformation, ok, other]

callbacks:
  early_stopping:
    patience: 50