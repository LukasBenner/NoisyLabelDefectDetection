# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: full_cleaned_new
run_name_postfix: focal

n_runs: 5

model:
  num_classes: 9
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: large
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.005
    momentum: 0.9
    weight_decay: 1e-5
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.FocalLoss
    gamma: 2.0

data:
  batch_size: 32
  image1k_norm: true
  transforms: medium

callbacks:
  early_stopping:
    patience: 50