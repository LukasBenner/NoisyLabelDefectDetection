# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: noisy
run_name_postfix: ce

n_runs: 10

model:
  num_classes: 10
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.0129
    momentum: 0.919
    weight_decay: 1.185e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
     _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  weight_alpha: 0.803
  transforms: strong
  image1k_norm: true
  train_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clustered/train
  val_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clustered/val
  test_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clustered/test

callbacks:
  early_stopping:
    patience: 30