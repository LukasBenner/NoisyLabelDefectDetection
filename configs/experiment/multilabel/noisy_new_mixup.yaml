# @package _global_

defaults:
  - /model: mixup
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: noisy_new_mixup
run_name_postfix: mixup

n_runs: 10

model:
  num_classes: 10
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.0112
    momentum:  0.892
    weight_decay: 1.407e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss
  mixup_alpha: 0.351

data:
  batch_size: 16
  weight_alpha: 0.00474
  image1k_norm: true
  transforms: medium
  train_path: /workspace/data/surfaceClassification/noisy_clustered_new/train
  val_path: /workspace/data/surfaceClassification/noisy_clustered_new/val
  test_path: /workspace/data/surfaceClassification/noisy_clustered_new/test

callbacks:
  early_stopping:
    patience: 30