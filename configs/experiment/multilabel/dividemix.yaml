# @package _global_

defaults:
  - /model: dividemix
  - override /data: dividemix_imagefolder
  - override /callbacks: no_early_stopping
  - _self_

experiment_name: "dividemix"
run_name_postfix: "test"

n_runs: 3

model:
  num_classes: 10
  lr: 0.01
  sgd_momentum: 0.9
  weight_decay: 5e-4
  noise_mode: asym
  alpha: 0.5
  lambda_u: 0.1
  p_threshold: 0.5
  T: 0.5
  warm_up: 10
  arch: mobilenet_small

data:
  batch_size: 16
  image1k_norm: true