# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: clean
run_name_postfix: focal

n_runs: 10

model:
  num_classes: 10
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 1e-5
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.FocalLoss
    gamma: 2.0

data:
  batch_size: 32
  image1k_norm: true
  transforms: medium
  train_path: /srv/defectDetectionDataset/surfaceClassification/full_clean_clustered_new/train
  val_path: /srv/defectDetectionDataset/surfaceClassification/full_clean_clustered_new/val
  test_path: /srv/defectDetectionDataset/surfaceClassification/full_clean_clustered_new/test

callbacks:
  early_stopping:
    patience: 30