# @package _global_

defaults:
  - /model: nal
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

research_name: SurfaceDefectDetection
experiment_name: noisy_new_nal
run_name_postfix: precomputed

n_runs: 10

model:
  num_classes: 10
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01983
    momentum: 0.793
    weight_decay: 7.513e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss
  noise_init_epoch: 5
  noise_instance_epoch: 10
  instance_hidden_dim: 256
  noise_init_eps: 0.000349
  use_precomputed_noise_matrix: true

data:
  batch_size: 16
  prefetch_factor: 4
  weight_alpha: 0.999
  image1k_norm: true
  transforms: strong
  train_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clustered_new/train
  val_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clustered_new/val
  test_path: /srv/defectDetectionDataset/surfaceClassification/noisy_clustered_new/test

callbacks:
  early_stopping:
    patience: 30