# Example experiment config with hyperparameters optimized via Optuna
# Use this as a template after running hyperparameter search
# 
# Usage:
#   python src/train.py experiment=surface_baseline_optimized trainer=gpu

# @package _global_

defaults:
  - override /data: default
  - override /model: surface_baseline
  - override /trainer: gpu
  - override /callbacks: default
  - override /logger: many_loggers

# Suggested optimized values (replace with your actual Optuna search results)
model:
  optimizer:
    lr: 0.0007        # From Optuna: typically in range 1e-5 to 1e-2
    weight_decay: 0.00005  # From Optuna: typically in range 1e-6 to 1e-2

data:
  batch_size: 128     # From Optuna: typically in range 16-256

# Full training with optimized hyperparameters
trainer:
  max_epochs: 100
  log_every_n_steps: 10

# Task configuration
task_name: "train_optimized"
train: true
test: true
