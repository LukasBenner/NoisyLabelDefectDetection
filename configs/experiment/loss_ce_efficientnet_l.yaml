# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

experiment_name: "Loss_CE"
run_name_postfix: "efficientnet_l"

n_runs: 5

model:
  net:
    _target_: src.models.components.efficient_net.EfficientNet
    pretrained: true
    variant: large
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 1e-5
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  image1k_norm: true
  transforms: medium

callbacks:
  early_stopping:
    patience: 50