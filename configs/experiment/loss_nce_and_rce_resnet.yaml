# @package _global_

defaults:
  - /model: base
  - override /data: holdout
  - override /callbacks: cifar
  - _self_

experiment_name: "Loss_NCE_RCE"
run_name_postfix: "resnet"

n_runs: 3

model:
  net:
    _target_: src.models.components.res_net.ResNet50
    pretrained: true
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.1
    momentum: 0.9
    weight_decay: 1e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    alpha: 10
    beta: 0.1

data:
  batch_size: 64
  image1k_norm: true