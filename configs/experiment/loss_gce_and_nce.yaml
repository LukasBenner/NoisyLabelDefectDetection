# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_GCE_NCE"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0056
    weight_decay: 0.0064
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.GCEandNCE
    alpha: 0.0047
    beta: 0.0018
    q: 0.54

data:
  batch_size: 32