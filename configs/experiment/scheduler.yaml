# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Scheduler"
run_name: "${now:%Y-%m-%d_%H-%M-%S}"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0002404
    weight_decay: 0.0005284
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32