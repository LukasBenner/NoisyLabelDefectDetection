# @package _global_

defaults:
  - /model: coteaching_mobilenetv3_large
  - override /data: holdout
  - override /callbacks: with_early_stopping
  - _self_

experiment_name: "CoTeaching-MobileNetV3-Large"
run_name_postfix: "coteaching"

n_runs: 5

data:
  batch_size: 32
  image1k_norm: true
  transforms: medium

callbacks:
  early_stopping:
    patience: 30
