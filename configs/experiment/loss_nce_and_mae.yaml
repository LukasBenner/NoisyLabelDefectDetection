# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_NCE_MAE"
run_name: "${now:%Y-%m-%d_%H-%M-%S}"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0044
    weight_decay: 0.0013
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandMAE
    alpha: 0.49
    beta: 1.63

data:
  batch_size: 32