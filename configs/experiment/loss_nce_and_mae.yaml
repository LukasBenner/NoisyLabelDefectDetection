# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_NCE_MAE"

model:
  optimizer:
    _target_: torch.optim.SGD
    _partial_: true
    lr: 0.01
    momentum: 0.9
    weight_decay: 3e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.NCEandMAE
    alpha: 50.0
    beta: 1.0

data:
  batch_size: 64