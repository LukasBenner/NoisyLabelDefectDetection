# @package _global_

defaults:
  - /model: noise_adaption
  - _self_

# Experiment name
experiment_name: "NoiseAdaption_S"

model:
  init_value: 0.9
  optimizer:
    _target_: torch.optim.SGD
    lr: 0.06959
    momentum: 0.1616
    weight_decay: 3.1045e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}

data:
  batch_size: 32
