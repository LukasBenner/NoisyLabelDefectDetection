# @package _global_

defaults:
  - /model: base
  - _self_

experiment_name: "Loss_GCE_RCE"

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0012
    weight_decay: 3.5e-05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
  criterion:
    _target_: src.models.components.loss.GCEandRCE
    alpha: 2.46
    beta: 0.088
    q: 0.046

data:
  batch_size: 32