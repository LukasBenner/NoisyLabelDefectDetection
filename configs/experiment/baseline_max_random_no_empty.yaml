# @package _global_

defaults:
  - /model: base
  - override /data: baseline
  - override /callbacks: with_early_stopping
  - _self_

experiment_name: "Baseline_Max"
run_name_postfix: "random_split_cleaned"

n_runs: 5

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    pretrained: true
    variant: small
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.00032
    weight_decay: 1e-5
  scheduler: Null
  criterion:
    _target_: src.models.components.loss.CELoss

data:
  batch_size: 32
  data_path: /srv/defectDetectionDataset/surface_baseline_no_empty

callbacks:
  early_stopping:
    patience: 20