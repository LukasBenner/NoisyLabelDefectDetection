# @package _global_

defaults:
  - _self_
  - paths: default
  - experiment: null

research_name: SurfaceDefectDetection
experiment_name: pretrain_finetune
run_name_postfix: ""
run_name: "${now:%Y-%m-%d_%H-%M-%S}_${run_name_postfix}"

log_path: ./logs

seed: 42
n_runs: 10
run_test: false

# ── Phase 1: Pretrain on synthetic data ──
pretrain:
  trainer:
    _target_: lightning.pytorch.trainer.Trainer
    default_root_dir: ${paths.output_dir}
    min_epochs: 5
    max_epochs: 50
    accelerator: gpu
    devices: [0]
    precision: 16-mixed
    check_val_every_n_epoch: 1
    deterministic: true

  model:
    _target_: src.models.base_robust_module.BaseRobustModule

  data:
    _target_: src.data.holdout_datamodule.HoldoutDataModule

  callbacks:
    model_checkpoint:
      _target_: lightning.pytorch.callbacks.ModelCheckpoint
      filename: "pretrain-epoch_{epoch:03d}-val_f1_{val/f1_macro:.4f}"
      monitor: "val/f1_macro"
      mode: "max"
      save_top_k: 1
      save_last: true
    early_stopping:
      _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: "val/f1_macro"
      mode: "max"
      patience: 15
    rich_progress_bar:
      _target_: lightning.pytorch.callbacks.RichProgressBar

# ── Phase 2: Finetune on real data ──
finetune:
  trainer:
    _target_: lightning.pytorch.trainer.Trainer
    default_root_dir: ${paths.output_dir}
    min_epochs: 10
    max_epochs: 200
    accelerator: gpu
    devices: [0]
    precision: 16-mixed
    check_val_every_n_epoch: 1
    deterministic: true

  model:
    _target_: src.models.pretrain_finetune_module.PretrainFinetuneModule

  data:
    _target_: src.data.holdout_datamodule.HoldoutDataModule

  callbacks:
    model_checkpoint:
      _target_: lightning.pytorch.callbacks.ModelCheckpoint
      filename: "finetune-epoch_{epoch:03d}-val_f1_{val/f1_macro:.4f}"
      monitor: "val/f1_macro"
      mode: "max"
      save_top_k: 1
      save_last: true
    early_stopping:
      _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: "val/f1_macro"
      mode: "max"
      patience: 20
    rich_progress_bar:
      _target_: lightning.pytorch.callbacks.RichProgressBar
    lr_monitor:
      _target_: lightning.pytorch.callbacks.LearningRateMonitor
      logging_interval: "epoch"

hydra:
  run:
    dir: ${log_path}/train/${research_name}/${experiment_name}/${run_name}
