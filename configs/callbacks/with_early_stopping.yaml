defaults:
  - model_checkpoint
  - early_stopping
  - rich_progress_bar
  - lr_monitor
  - _self_

model_checkpoint:
  filename: "epoch_{epoch:03d}-val_f1_{val/f1_macro:.4f}"
  monitor: "val/f1_macro"
  mode: "max"
  save_last: True
  auto_insert_metric_name: False

early_stopping:
  monitor: "val/f1_macro"
  mode: "max"
  patience: 20

model_summary:
  max_depth: -1
