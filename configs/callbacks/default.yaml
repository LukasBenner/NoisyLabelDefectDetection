defaults:
  - model_checkpoint
  - early_stopping
  - rich_progress_bar
  - lr_monitor
  - _self_

model_checkpoint:
  filename: "epoch_{epoch:03d}-val_acc_{val/acc:.4f}"
  monitor: "val/acc"
  mode: "max"
  save_last: True
  auto_insert_metric_name: False

early_stopping:
  monitor: "val/acc"
  mode: "max"
  patience: 10

model_summary:
  max_depth: -1
