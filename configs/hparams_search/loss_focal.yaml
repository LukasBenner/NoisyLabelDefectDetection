# @package _global_

defaults:
  - default
  - _self_

study_name: focal
run_name_postfix: focal

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    num_classes: ${model.num_classes}
    pretrained: true
    variant: small
  criterion:
    _target_: src.models.components.loss.FocalLoss
    gamma: 2
    alpha: 0.5


search_space:
  model:
    optimizer:
      lr:
        type: float
        low: 1.0e-4
        high: 5.0e-2
        log: true
      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true
      momentum:
        type: float
        low: 0.7
        high: 0.99
    criterion:
      alpha:
        type: float
        low: 0.1
        high: 1
      gamma:
        type: float
        low: 0.1
        high: 5
  data:
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    weight_alpha:
      type: float
      low: 0.0
      high: 1.0
    transforms:
      type: categorical
      choices: [medium, strong]