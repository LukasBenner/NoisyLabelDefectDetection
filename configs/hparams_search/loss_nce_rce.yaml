# @package _global_

defaults:
  - default
  - _self_

study_name: nce_rce
run_name_postfix: nce_rce

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    num_classes: ${model.num_classes}
    pretrained: true
    variant: small
  criterion:
    _target_: src.models.components.loss.NCEandRCE
    alpha: 1
    beta: 0.1


enqueue_trials:
  - "model.optimizer.lr": 4.92e-3
    "model.optimizer.weight_decay": 8.862e-5
    "model.optimizer.momentum": 0.797
    "model.criterion.alpha": 0.167
    "model.criterion.beta": 0.244
    "data.batch_size": 32
    "data.weight_alpha": 0.958
    "data.transforms": medium

search_space:
  model:
    optimizer:
      lr:
        type: float
        low: 1.0e-4
        high: 5.0e-2
        log: true
      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true
      momentum:
        type: float
        low: 0.7
        high: 0.99
    criterion:
      alpha:
        type: float
        low: 0.01
        high: 10
        log: true
      beta:
        type: float
        low: 0.01
        high: 10
        log: true
  data:
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    weight_alpha:
      type: float
      low: 0.0
      high: 1.0
    transforms:
      type: categorical
      choices: [medium, strong]