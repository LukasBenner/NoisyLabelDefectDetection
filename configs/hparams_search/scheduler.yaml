# @package _global_

defaults:
  - default
  - _self_

study_name: scheduler

search_space:
  optimizer:
    lr:
      type: "float"
      low: 1.0e-4
      high: 1.0e-1
      log: true
    weight_decay:
      type: "float"
      low: 1.0e-6
      high: 1.0e-1
      log: true
  data:
    batch_size:
      type: "categorical"
      choices: [32, 64, 96]