# @package _global_

defaults:
  - default
  - _self_

study_name: mobilenet_small

model:
  net:
    _target_: src.models.components.mobile_net.MobileNet
    num_classes: ${model.num_classes}
    pretrained: true
    variant: small

enqueue_trials:
  - "model.optimizer.lr": 1.0e-3
    "model.optimizer.weight_decay": 1.8e-5
    "model.optimizer.momentum": 0.8
    "data.batch_size": 16
    "data.weight_alpha": 0.17
    "data.transforms": strong

search_space:
  model:
    optimizer:
      lr:
        type: float
        low: 1.0e-4
        high: 5.0e-2
        log: true
      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true
      momentum:
        type: float
        low: 0.7
        high: 0.99
  data:
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    weight_alpha:
      type: float
      low: 0.0
      high: 1.0
    transforms:
      type: categorical
      choices: [medium, strong]
