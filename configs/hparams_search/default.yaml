# @package _global_

optimized_metric: val/f1_macro_best
direction: maximize

study_name: null

n_trials: 50

# Optional: stop after this many hours regardless of n_trials (null = no timeout)
timeout_hours: 10

# Pruner settings: pruning only kicks in after pruner_n_startup_trials full trials
# and after pruner_n_warmup_steps steps within each trial
pruner_n_startup_trials: 5
pruner_n_warmup_steps: 10