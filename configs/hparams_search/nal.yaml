# @package _global_

defaults:
  - default
  - _self_

study_name: nal
run_name_postfix: nal

trainer:
  deterministic: False

search_space:
  model:
    optimizer:
      lr:
        type: float
        low: 1.0e-4
        high: 5.0e-2
        log: true
      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true
      momentum:
        type: float
        low: 0.7
        high: 0.99
    instance_hidden_dim:
      type: categorical
      choices: [32, 64, 128, 256, 512]
    noise_init_eps:
      type: float
      low: 1.0e-5
      high: 1.0e-2
      log: true

  data:
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    weight_alpha:
      type: float
      low: 0.0
      high: 1.0
    transforms:
      type: categorical
      choices: [medium, strong]