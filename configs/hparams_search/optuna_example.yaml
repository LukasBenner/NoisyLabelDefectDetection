# Example configuration for hyperparameter search
# This config defines the search space and parameters

defaults:
  - override hydra/launcher: basic
  - override hydra/sweeper: optuna

# Trainer config - reduced epochs for faster search iterations
trainer:
  max_epochs: 10
  log_every_n_steps: 10

# Data config
data:
  batch_size: 64  # Will be overridden by Optuna
  num_workers: 4

# Model config
model:
  compile: false
  optimizer:
    lr: 0.001  # Will be overridden by Optuna
    weight_decay: 0.0001  # Will be overridden by Optuna

# Hydra Optuna sweeper configuration
hydra:
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    pruner:
      _target_: optuna.pruners.MedianPruner
      n_startup_trials: 3
      n_warmup_steps: 5
    direction: maximize
    study_name: surface_baseline_hpo
    storage: null
    n_trials: 20
    n_jobs: 1
    
    # Define the search space
    params:
      data.batch_size:
        type: int
        low: 16
        high: 256
        step: 16
        log: false
      model.optimizer.lr:
        type: float
        low: 1e-5
        high: 1e-2
        log: true
      model.optimizer.weight_decay:
        type: float
        low: 1e-6
        high: 1e-2
        log: true
  
  job:
    chdir: true
  
  runtime:
    choices:
      hydra/sweeper: optuna
      hydra/launcher: basic
