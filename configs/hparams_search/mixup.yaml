# @package _global_

defaults:
  - default
  - _self_

study_name: mixup
run_name_postfix: mixup

enqueue_trials:
  - "model.optimizer.lr": 0.0112
    "model.optimizer.weight_decay": 1.407e-5
    "model.optimizer.momentum": 0.892
    "model.mixup_alpha": 0.351
    "data.batch_size": 16
    "data.weight_alpha": 0.00474
    "data.transforms": medium

search_space:
  model:
    optimizer:
      lr:
        type: float
        low: 1.0e-4
        high: 5.0e-2
        log: true
      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true
      momentum:
        type: float
        low: 0.7
        high: 0.99
    mixup_alpha:
      type: float
      low: 0.0
      high: 1.0

  data:
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    weight_alpha:
      type: float
      low: 0.0
      high: 1.0
    transforms:
      type: categorical
      choices: [medium, strong]