# @package _global_

defaults:
  - default
  - _self_

study_name: efficientnet_m

search_space:
  model:
    net:
      _target_: src.models.components.efficient_net.EfficientNet
      num_classes: ${model.num_classes}
      pretrained: true
      variant: medium
    optimizer:
      lr:
        type: float
        low: 5.0e-5
        high: 2.0e-2
        log: true
      weight_decay:
        type: float
        low: 1.0e-6
        high: 1.0e-3
        log: true
      momentum:
        type: float
        low: 0.7
        high: 0.99
  data:
    batch_size:
      type: categorical
      choices: [16, 32, 64]
    weight_alpha:
      type: float
      low: 0.0
      high: 1.0
    transforms:
      type: categorical
      choices: [medium, strong]
