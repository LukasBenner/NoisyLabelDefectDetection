# @package _global_

defaults:
  - paths: default
  - trainer: gpu
  - _self_
  - callbacks: with_early_stopping
  - data: surface_data
  - experiment: null
  - hparams_search: default

research_name: SurfaceDefectDetection
run_name_postfix: ""
run_name: "${now:%Y-%m-%d_%H-%M-%S}_${run_name_postfix}"

log_path: ./logs

seed: 42

trainer:
  deterministic: false
  max_epochs: 100

hydra:
  run:
    dir: ${log_path}/sweep/${research_name}/${experiment_name}/${run_name}