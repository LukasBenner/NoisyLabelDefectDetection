# @package _global_

experiment_name: SurfaceDefectDetection
run_name: "baseline_${now:%Y-%m-%d_%H-%M-%S}"

log_path: ./logs

seed: 42
num_runs: 2
num_epochs: 50
lr: 0.00032
weight_decay: 0.0
early_stopping_patience: 10

model:
  _target_: src.models.components.mobile_net.MobileNet
  pretrained: true

data:
  train_data_path: ./data/surface/train
  test_data_path: ./data/surface/test
  batch_size: 32
  num_workers: 4

trainer:
  device_id: 0
  compile: true

hydra:
  run:
    dir: ${log_path}/train/${experiment_name}/${run_name}