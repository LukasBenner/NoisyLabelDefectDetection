_target_: src.models.seal_module.SEALIterationModule

num_classes: 9

epochs_per_iteration: 10  # Number of epochs per iteration (T in algorithm)

# Base network
net:
  _target_: src.models.components.efficient_net.EfficientNet
  num_classes: ${model.num_classes}
  pretrained: true

# Optimizer configuration (partial instantiation)
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.003
  weight_decay: 0.0003

# Scheduler configuration (partial instantiation)
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 30  # Total epochs = num_iterations * epochs_per_iteration
  eta_min: 0.00001

# Model compilation
compile: false
