_target_: src.models.noise_adaption_module.NoiseAdaptionModule

num_classes: 10  # Will be set dynamically from datamodule

# Base network (without noise adaption layer - it will be added by the module)
net:
  _target_: src.models.components.mobile_net.MobileNet
  num_classes: ${model.num_classes}
  pretrained: true

# Noise adaption layer parameters
init_value: 0.9  # Initial diagonal value for transition matrix (assumes 90% correct labels)

# Optimizer configuration (partial instantiation)
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.001
  weight_decay: 0.01

# Scheduler configuration (partial instantiation)
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: ${num_epochs}
  eta_min: 0.00001

criterion:
  _target_: src.models.components.loss.CELoss
  _partial_: true

# Model compilation
compile: false
