_target_: src.models.dividemix_module.DivideMixModule

num_classes: 10

net1:
  _target_: src.models.components.mobile_net.MobileNet
  num_classes: ${model.num_classes}
  pretrained: true
  variant: large

net2:
  _target_: src.models.components.mobile_net.MobileNet
  num_classes: ${model.num_classes}
  pretrained: true
  variant: large

optimizer:
  _target_: torch.optim.SGD
  _partial_: true
  lr: 0.02
  momentum: 0.9
  weight_decay: 5e-4

scheduler:
  _target_: torch.optim.lr_scheduler.MultiStepLR
  _partial_: true
  milestones: [150]
  gamma: 0.1

warmup_epochs: 10
p_threshold: 0.5
lambda_u: 25.0
temperature: 0.5
mixup_alpha: 4.0
rampup_length: 16
gmm_iters: 10

compile: false
